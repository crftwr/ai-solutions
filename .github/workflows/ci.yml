name: CI

# Every commit on main / every PR runs the fast-checks job; the
# regression job exercises the C++ interceptor end-to-end via the text
# smoke-test against Llama-3.2-1B (~10 GMACs / 5 k trace lines).
#
# The regression job is heavy (~15-25 min cold) because it builds
# llama.cpp + the interceptor inside the Docker image. We rely on the
# buildx cache action to make warm runs much faster.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:

  # -----------------------------------------------------------------------
  # Fast checks: lint + unit tests on the Python aggregation/validate code.
  # No Docker, no model download. Targets every push.
  # -----------------------------------------------------------------------
  fast-checks:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: vlm_op_profiler
    steps:
      - uses: actions/checkout@v4
        # No submodules — the Python tests don't need llama.cpp.

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: vlm_op_profiler/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ruff (lint)
        run: ruff check scripts/

      - name: pytest (unit tests, excluding regression)
        env:
          PYTHONPATH: scripts
        run: pytest scripts/tests/ -v --deselect scripts/tests/test_regression.py

  # -----------------------------------------------------------------------
  # Regression test: builds the Docker image, fetches the 800 MB text model
  # (cached across runs), and runs `make regression-test` which exercises
  # the C++ interceptor end-to-end and runs validate.py + test_regression.py.
  # -----------------------------------------------------------------------
  regression:
    name: End-to-end regression
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: vlm_op_profiler
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free disk space
        # GitHub-hosted runners have ~14 GB free; the llama.cpp build alone
        # produces several gigs of object files. Clear the rarely-used
        # toolchains shipped on the image to make headroom.
        run: |
          sudo rm -rf /opt/ghc /opt/hostedtoolcache/CodeQL /usr/share/dotnet \
                      /usr/local/lib/android /usr/local/share/boost
          df -h /

      - name: Cache models directory (~800 MB Llama-3.2-1B)
        uses: actions/cache@v4
        with:
          path: vlm_op_profiler/models
          key: text-model-v1

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build profiler Docker image
        # cache-to / cache-from accelerate warm CI runs by storing the
        # build output as a registry-format cache scoped to this repo.
        uses: docker/build-push-action@v6
        with:
          context: vlm_op_profiler
          push: false
          load: true
          tags: vlm-op-profiler:latest
          build-args: |
            PROFILER_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=vlm-op-profiler
          cache-to:   type=gha,scope=vlm-op-profiler,mode=max

      - name: Fetch text model (idempotent — skipped if cached)
        run: make fetch-model-text

      - name: Run regression test
        # The target chains: smoke-test-text → validate.py → pytest
        # scripts/tests/test_regression.py. Any failure here means the
        # interceptor, MAC accounting, or classifier has regressed.
        run: make regression-test
